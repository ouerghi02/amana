<div class="card shadow-sm m-3">
  <div class="card-header bg-primary text-white"><h5>Liste des Étudiants</h5></div>
  <div class="card-body">
    <table class="table table-hover">
      <thead>
        <tr>
          <th>Nom</th><th>Prénom</th><th>Classe</th><th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let s of students">
          <td>{{ s.nom }}</td><td>{{ s.prenom }}</td><td>{{ s.classe }}</td>
          <td>
            <button class="btn btn-sm btn-danger" (click)="deleteStudent(s.id)">Supprimer</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
